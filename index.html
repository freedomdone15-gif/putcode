<!DOCTYPE html>
<html>
<head>
  <title>Code Drop</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.1);
      --border-active: rgba(255,255,255,0.8);
      --accent: #e2e2e2;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
      --yellow: #eab308;
      --text-muted: rgba(255,255,255,0.35);
      --text-dim: rgba(255,255,255,0.6);
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      padding: 36px 24px;
      gap: 28px;
      min-height: 100vh;
      background-image: radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.025) 0%, transparent 60%);
    }

    /* ── MAIN CONTAINER ── */
    .container {
      max-width: 480px;
      width: 100%;
      flex-shrink: 0;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: #fff;
      font-size: 17px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      letter-spacing: 2px;
      outline: none;
      margin-bottom: 28px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: var(--text-muted); letter-spacing: 1px; font-size: 14px; }
    input:focus {
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05), 0 0 20px rgba(255,255,255,0.04);
    }
    input:disabled { opacity: 0.4; cursor: not-allowed; }

    h4 {
      text-align: center;
      letter-spacing: 3px;
      margin: 24px 0 12px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      position: relative;
    }
    h4::before, h4::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 28%;
      height: 1px;
      background: var(--border);
    }
    h4::before { left: 0; }
    h4::after { right: 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 13px 10px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: var(--text-dim);
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }
    .btn:hover {
      background: var(--surface2);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }
    .btn.active {
      background: #fff;
      border-color: #fff;
      color: #000;
      font-weight: 700;
      box-shadow: 0 0 16px rgba(255,255,255,0.12);
    }
    .full { grid-column: span 3; }

    .status {
      text-align: right;
      margin-top: 20px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .status.connected { color: var(--green); }
    .status.disconnected { color: var(--red); }
    .status.sending { color: var(--yellow); }

    /* ── LOGS PANEL ── */
    .logs-panel {
      width: 320px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px;
      height: fit-content;
      max-height: calc(100vh - 72px);
      position: sticky;
      top: 36px;
    }

    .logs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }
    .logs-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .logs-count {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .logs-clear {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 9px;
      border-radius: 5px;
      border: 1px solid var(--border);
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .logs-clear:hover { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.07); }

    .logs-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-height: calc(100vh - 180px);
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
      padding-right: 2px;
    }
    .logs-list::-webkit-scrollbar { width: 3px; }
    .logs-list::-webkit-scrollbar-track { background: transparent; }
    .logs-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .log-entry {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 2.5px solid rgba(34,197,94,0.5);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 11px;
      line-height: 1.6;
      animation: slideIn 0.18s ease;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }
    .log-entry:hover {
      border-color: rgba(255,255,255,0.2);
      border-left-color: var(--green);
      background: rgba(255,255,255,0.02);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .log-index {
      position: absolute;
      top: 9px;
      right: 10px;
      color: var(--text-muted);
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
    }
    .log-time {
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      margin-bottom: 3px;
      opacity: 0.85;
    }
    .log-code {
      font-size: 13px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 3px;
    }
    .log-meta {
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .log-empty {
      color: var(--text-muted);
      font-size: 11px;
      text-align: center;
      margin-top: 50px;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 2;
    }

    /* ── AUTO COPY TOGGLE ── */
    .copy-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .copy-toggle:hover { border-color: rgba(255,255,255,0.25); }
    .copy-toggle.enabled {
      border-color: rgba(34,197,94,0.5);
      background: rgba(34,197,94,0.06);
    }
    .copy-toggle-icon {
      font-size: 15px;
      line-height: 1;
      flex-shrink: 0;
    }
    .copy-toggle-label {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .copy-toggle.enabled .copy-toggle-label { color: var(--green); }
    .copy-toggle-desc {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      display: block;
      margin-top: 1px;
    }
    .copy-toggle-switch {
      width: 36px;
      height: 20px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .copy-toggle.enabled .copy-toggle-switch {
      background: var(--green);
      border-color: var(--green);
    }
    .copy-toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .copy-toggle.enabled .copy-toggle-switch::after {
      transform: translateX(16px);
      background: #000;
    }

    /* ── NOTIFICATIONS ── */
    .notification {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid;
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 1000;
      transform: translateY(-6px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .notification.show { opacity: 1; transform: translateY(0); }
    .notification.success { border-color: var(--green); color: var(--green); }
    .notification.error   { border-color: var(--red);   color: var(--red); }
    .notification.warning { border-color: var(--orange); color: var(--orange); }

    /* ── CONNECTION DOT ── */
    .connection-indicator {
      position: fixed;
      top: 24px;
      left: 24px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .connection-indicator.connected {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.2), 0 0 12px rgba(34,197,94,0.5);
    }
    .connection-indicator.connecting {
      background: var(--orange);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
<div class="connection-indicator" id="connectionIndicator"></div>
<div class="container">
  <!-- CODE INPUT -->
  <input id="codeInput" placeholder="ENTER CODE" autofocus />
  <!-- AUTO COPY TOGGLE -->
  <div class="copy-toggle" id="copyToggle" onclick="toggleAutoCopy()">
    <span class="copy-toggle-icon">📋</span>
    <span class="copy-toggle-label">
      Auto Copy
      <span class="copy-toggle-desc">Copies the code to clipboard when sent</span>
    </span>
    <div class="copy-toggle-switch"></div>
  </div>
  <!-- VALUE -->
  <h4>SELECT VALUE</h4>
  <div class="grid" id="valueGrid">
    <div class="btn active">$1</div>
    <div class="btn">$2</div>
    <div class="btn">$3</div>
    <div class="btn">$4</div>
    <div class="btn">$5</div>
    <div class="btn">$6.25</div>
    <div class="btn">$12.50</div>
    <div class="btn">$25</div>
    <div class="btn">$50</div>
    <div class="btn full">NO VALUE</div>
  </div>
  <!-- CODE TYPE -->
  <h4>SELECT CODE TYPE</h4>
  <div class="grid" id="typeGrid">
    <div class="btn full active">HIGH ROLLERS</div>
    <div class="btn full">WEEKLY STREAM</div>
    <div class="btn full">OTHER DROPS</div>
  </div>
  <div class="status disconnected" id="status">CONNECTING…</div>
</div>

<!-- LOGS PANEL -->
<div class="logs-panel">
  <div class="logs-header">
    <span class="logs-title">SEND LOG</span>
    <span class="logs-count" id="logsCount">0 / 50</span>
    <span class="logs-clear" onclick="clearLogs()">CLEAR</span>
  </div>
  <div class="logs-list" id="logsList">
    <div class="log-empty" id="logsEmpty">NO CODES SENT YET</div>
  </div>
</div>

<div class="notification" id="notification"></div>
<script>
  let selectedValue = "$1";
  let selectedType = "HIGH ROLLERS";
  let isConnected = false;
  let autoCopy = false;
  let sentLogs = [];
  const MAX_LOGS = 50;

  function toggleAutoCopy() {
    autoCopy = !autoCopy;
    const el = document.getElementById("copyToggle");
    el.classList.toggle("enabled", autoCopy);
  }

  function addLog(code, value, codetype) {
    const now = new Date();
    const timeStr = now.toTimeString().split(" ")[0];
    const ms = String(now.getMilliseconds()).padStart(3, "0");
    sentLogs.unshift({ code, value, codetype, time: `${timeStr}.${ms}` });
    if (sentLogs.length > MAX_LOGS) sentLogs.pop();
    renderLogs();
  }

  function renderLogs() {
    const list = document.getElementById("logsList");
    document.getElementById("logsCount").textContent = `${sentLogs.length} / ${MAX_LOGS}`;
    if (sentLogs.length === 0) {
      list.innerHTML = '<div class="log-empty">NO CODES SENT YET</div>';
      return;
    }
    list.innerHTML = sentLogs.map((e, i) => `
      <div class="log-entry">
        <span class="log-index">#${sentLogs.length - i}</span>
        <div class="log-time">&#9201; ${e.time}</div>
        <div class="log-code">${e.code}</div>
        <div class="log-meta">${e.codetype.toUpperCase().replace(/_/g, " ")} &nbsp;&middot;&nbsp; ${e.value || "NO VALUE"}</div>
      </div>
    `).join("");
  }

  function clearLogs() {
    sentLogs = [];
    renderLogs();
  }

  // Initialize socket - WebSocket only for fastest performance
  const socket = io(
    "https://kciade.online/ws/ingest",
    {
      transports: ["websocket"], // WebSocket only - no polling fallback
      query: { username: "bharat" },
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      reconnectionAttempts: Infinity,
      timeout: 20000,
      forceNew: false,
      perMessageDeflate: false // Disable compression for small payloads
    }
  );
  
  // CONNECTION HANDLERS
  socket.on("connect", () => {
    console.log("[CONNECT]", socket.id, new Date().toLocaleTimeString());
    isConnected = true;
    updateStatus("CONNECTED", "connected");
    updateConnectionIndicator("connected");
    showNotification("Connected", "success");
  });
  
  socket.on("disconnect", (reason) => {
    console.log("[DISCONNECT]", reason, new Date().toLocaleTimeString());
    isConnected = false;
    updateStatus("DISCONNECTED", "disconnected");
    updateConnectionIndicator("disconnected");
    
    // Socket.IO will auto-reconnect - just log the reason
    if (reason === "io server disconnect") {
      showNotification("Server closed connection", "error");
    } else if (reason === "transport error" || reason === "transport close") {
      showNotification("Connection lost", "error");
    }
  });
  
  socket.on("reconnect_attempt", (attemptNumber) => {
    console.log("[RECONNECT_ATTEMPT]", attemptNumber, new Date().toLocaleTimeString());
    updateStatus(`RECONNECTING (${attemptNumber})...`, "disconnected");
    updateConnectionIndicator("connecting");
  });
  
  socket.on("reconnect", (attemptNumber) => {
    console.log("[RECONNECT_SUCCESS]", attemptNumber, new Date().toLocaleTimeString());
    showNotification("Reconnected!", "success");
  });
  
  socket.on("connect_error", (error) => {
    console.error("[CONNECT_ERROR]", error.message, new Date().toLocaleTimeString());
    // Let Socket.IO retry
  });
  
  socket.on("reconnect_failed", () => {
    console.error("[RECONNECT_FAILED]", new Date().toLocaleTimeString());
    updateStatus("RECONNECTION FAILED", "disconnected");
    showNotification("Cannot reconnect - check connection", "error");
  });
  
  // Optional heartbeat for metrics only (no reconnect logic)
  setInterval(() => {
    if (socket.connected) {
      socket.emit("client_heartbeat");
      console.log("[HEARTBEAT]", new Date().toLocaleTimeString());
    }
  }, 30000);
  
  // Server pong handler (metrics only)
  socket.on("server_pong", () => {
    console.log("[SERVER_PONG]", new Date().toLocaleTimeString());
  });
  
  // Async confirmation handler (logging only, no UI blocking)
  socket.on("code_ack", (data) => {
    console.log("[CODE_ACK] Server confirmed:", data);
  });
  
  // STATUS UPDATE
  function updateStatus(text, className) {
    const statusEl = document.getElementById("status");
    statusEl.innerText = text;
    statusEl.className = `status ${className}`;
  }
  
  function updateConnectionIndicator(state) {
    const indicator = document.getElementById("connectionIndicator");
    indicator.className = `connection-indicator ${state}`;
  }
  
  // NOTIFICATION SYSTEM
  function showNotification(message, type) {
    const notif = document.getElementById("notification");
    notif.innerText = message;
    notif.className = `notification ${type} show`;
    setTimeout(() => {
      notif.classList.remove("show");
    }, 3000);
  }
  
  // BUTTON SELECTION LOGIC
  function setupGrid(gridId, onSelect) {
    document.querySelectorAll(`#${gridId} .btn`).forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(`#${gridId} .btn`)
          .forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        onSelect(btn.innerText);
      };
    });
  }
  
  setupGrid("valueGrid", v => {
    selectedValue = v === "NO VALUE" ? null : v;
  });
  
  setupGrid("typeGrid", t => {
    selectedType = t;
  });
  
  // ENTER = SEND
  document.getElementById("codeInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendCode();
  });
  
  function sendCode() {
    const input = document.getElementById("codeInput");
    const code = input.value.trim();
    
    // Prevent double-send without delays
    if (input.disabled) return;
    
    if (!code) {
      showNotification("Please enter a code", "error");
      return;
    }
    
    if (!socket.connected) {
      showNotification("Not connected - please wait", "error");
      return;
    }
    
    // Minimal payload - removed unused metadata
    const payload = {
      token: "marc_henry",
      username: "bharat",
      code: code,
      source: "web-ui",
      type: "default",
      codetype: selectedType.toLowerCase().replace(/ /g, "_"),
      value: selectedValue
    };
    
    // Brief disable to prevent spam (only 1 JS tick)
    input.disabled = true;
    
    // Send immediately - no waiting for ACK
    socket.emit("code", payload);
    addLog(code, selectedValue, payload.codetype);

    // Auto-copy to clipboard if enabled
    if (autoCopy) {
      navigator.clipboard.writeText(code).then(() => {
        showNotification(`"${code}" sent & copied!`, "success");
      }).catch(() => {
        showNotification(`"${code}" sent (copy failed)`, "warning");
      });
    } else {
      showNotification(`Code "${code}" sent`, "success");
    }

    // IMMEDIATELY reset UI (instant feedback)
    input.value = "";
    input.disabled = false;
    input.focus();
    
    console.log("[SEND]", payload, new Date().toLocaleTimeString());
  }
  
  // Network status handlers
  window.addEventListener("online", () => {
    console.log("[NETWORK] Online");
    showNotification("Internet restored", "success");
    if (!socket.connected) {
      socket.connect();
    }
  });
  
  window.addEventListener("offline", () => {
    console.log("[NETWORK] Offline");
    showNotification("No internet connection", "error");
    updateStatus("OFFLINE", "disconnected");
    updateConnectionIndicator("disconnected");
  });
</script>
</body>
</html>
